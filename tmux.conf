# ─── Options ──────────────────────────────────────────────────────────────────
# Enforce a minimum version of 3.6
# If the version check fails, display an error message and instantly exit.
if-shell -b '[ "$(echo "$(tmux -V | cut -d" " -f2 | tr -d "a-z") < 3.6" | bc)" = 1 ]' {
    display-message -p "CRITICAL ERROR: tmux version 3.6 or higher is required!"
    run-shell "sleep 3" # Give the user time to read the error
    kill-server
}

set-option -g base-index 1
set-option -g default-shell $SHELL
set-option -g focus-events on
set-option -g history-limit 100000
set-option -g mouse on
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g set-titles on
set-option -g set-titles-string "#W"
set-option -s set-clipboard on

set-window-option -g aggressive-resize on
set-window-option -g mode-keys vi

# True Color and italics
#   https://gist.github.com/andersevenrud/015e61af2fd264371032763d4ed965b6
#
# tmux-256color on macOS
#   https://gpanders.com/blog/the-definitive-guide-to-using-tmux-256color-on-macos/
#   https://gist.github.com/bbqtd/a4ac060d6f6b9ea6fe3aabe735aa9d95
#   https://gist.github.com/nicm/ea9cf3c93f22e0246ec858122d9abea1
set-option -g default-terminal "tmux-256color"
set-option -as terminal-overrides ",*256col*:RGB"

# Allow app to receive Shift+Enter
set-option -g extended-keys on
set-option -g extended-keys-format csi-u

# ─── Key Bindings ─────────────────────────────────────────────────────────────
bind-key R source-file ~/.tmux.conf \; display-message "⚡Config reloaded successfully!"

bind C-b send-prefix

bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'V' send-keys -X select-line
bind-key -T copy-mode-vi 'r' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel

bind-key 'c' new-window -c "#{pane_current_path}"
bind-key 'v' split-window -h -c "#{pane_current_path}"
bind-key 's' split-window -v -c "#{pane_current_path}"
bind-key 'C-c' new-window -c "#{pane_current_path}"
bind-key 'C-v' split-window -h -c "#{pane_current_path}"
bind-key 'C-s' split-window -v -c "#{pane_current_path}"

bind-key -n C-Tab next-window
bind-key -n C-BTab previous-window

bind-key 'C-p' previous-window
bind-key 'C-n' next-window

bind-key 'S' choose-session

bind-key 'h' select-pane -L
bind-key 'j' select-pane -D
bind-key 'k' select-pane -U
bind-key 'l' select-pane -R
bind-key 'C-h' select-pane -L
bind-key 'C-j' select-pane -D
bind-key 'C-k' select-pane -U
bind-key 'C-l' select-pane -R

# ─── Theme ────────────────────────────────────────────────────────────────────
set-option -g @catppuccin_window_text " #{=|-16|…:window_name}"
set-option -g @catppuccin_window_current_text " #{=|-16|…:window_name}"

set-option -g @catppuccin_status_left_separator ""
set-option -g @catppuccin_status_right_separator " "

set-option -g @catppuccin_session_icon " #S "
set-option -g @catppuccin_session_text ""

set-option -g @catppuccin_host_icon ""

if "test ! -d ~/.config/tmux/plugins/catppuccin/tmux" \
   "run-shell 'mkdir -p ~/.config/tmux/plugins/catppuccin && git clone -b v2.3.0 https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin/tmux'"
run-shell ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set-option -g status-left "#{E:@catppuccin_status_session}"
set-option -g status-right "#{E:@catppuccin_status_host}"

# ─── Override ─────────────────────────────────────────────────────────────────
source-file -q ~/.tmux.local.conf
